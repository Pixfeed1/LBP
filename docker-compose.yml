services:
  postgres:
    image: postgres:16-alpine
    container_name: lbp-v2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT}:5432"
    networks:
      lbp-v2-net:
        ipv4_address: 172.21.0.5
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lbp-v2-redis
    restart: unless-stopped
    volumes:
      - ./data/redis:/data
    ports:
      - "127.0.0.1:${REDIS_PORT}:6379"
    networks:
      lbp-v2-net:
        ipv4_address: 172.21.0.6
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: lbp-v2-backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./data/uploads:/app/uploads
      - ./logs:/app/logs
    # Pas de port mapping : on accède via 172.21.0.10:8000 (réseau Docker direct)
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      lbp-v2-net:
        ipv4_address: 172.21.0.10

networks:
  lbp-v2-net:
    external: true
